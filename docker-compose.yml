version: '3.8'
services:
  acis_db:
    image: postgres:15-alpine
    container_name: acis_postgres
    restart: always
    environment:
      POSTGRES_USER: acis_user
      POSTGRES_PASSWORD: acis_secret_password
      POSTGRES_DB: acis_db
    ports:
      - "5432:5432"
    volumes:
      - acis_data:/var/lib/postgresql/data

volumes:
  acis_data:
